services:
  ssh-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ssh-mcp-server
    
    # Expose port for HTTP server
    ports:
      - "8005:8000"
    
    # Runtime environment variables
    environment:
      # SSH variables
      - SSH_HOST=${SSH_HOST:-localhost}
      - SSH_USER=${SSH_USER:-root}
      - SSH_PASSWORD=${SSH_PASSWORD}
      - SSH_KEY_FILE=${SSH_KEY_FILE:-/app/ssh_keys/id_ed25519}
      - SSH_PORT=${SSH_PORT:-22}
      - AUTH_TOKEN=${AUTH_TOKEN:-}
      # Server configuration
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000

    # Persist SSH keys across container restarts
    volumes:
      - ssh_keys:/app/ssh_keys

    # Restart container in case of error
    restart: unless-stopped
    
    # Network connections
    networks:
      - ssh-mcp-network
      - backend

networks:
  ssh-mcp-network:
    driver: bridge
  backend:
    external: true
    name: llm-rag-mcp_backend

volumes:
  ssh_keys:
